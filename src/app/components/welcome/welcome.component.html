<div class="landing-container">
      <div class="hero-section">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
              <div class="logo-icon mb-4">
                <i class="fa fa-boxes fa-5x"></i>
              </div>
              
              <!-- Show different content based on authentication -->
              <div *ngIf="!isAuthenticated">
                <h1 class="hero-title">Inventory Management System</h1>
                <p class="hero-subtitle mb-4">
                  Efficiently manage your products, categories, and inventory in one place
                </p>
                <div class="button-group">
                  <a href="/login" class="btn-login">
                    <i class="fa fa-sign-in me-2"></i>Login
                  </a>
                  <a href="/register" class="btn-register">
                    <i class="fa fa-user-plus me-2"></i>Register
                  </a>
                </div>
              </div>
              
              <!-- For authenticated users, show navigation options -->
              <div *ngIf="isAuthenticated">
                <h1 class="hero-title">Welcome, {{ userName }}!</h1>
                <p class="hero-subtitle mb-4">
                  You are logged in. Click below to access your inventory.
                </p>
                <div class="button-group">
                  <a href="/products" class="btn-login">
                    <i class="fa fa-boxes me-2"></i>View Products
                  </a>
                  <a href="/categories" class="btn-register">
                    <i class="fa fa-tags me-2"></i>View Categories
                  </a>
                  <button class="btn-logout" (click)="logout()">
                    <i class="fa fa-sign-out me-2"></i>Logout
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
