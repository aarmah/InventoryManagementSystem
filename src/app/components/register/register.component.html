 <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-header bg-white border-0 text-center pt-4">
            <h3 class="mb-0">
              <i class="fa fa-user-plus me-2 text-success"></i>Create Account
            </h3>
            <p class="text-muted mt-2 mb-0">Register to get started</p>
          </div>
          <div class="card-body p-4">
            <div *ngIf="errorMessage" class="alert alert-danger">
              {{ errorMessage }}
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" class="form-control form-control-lg" [(ngModel)]="firstName">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" class="form-control form-control-lg" [(ngModel)]="lastName">
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control form-control-lg" [(ngModel)]="email">
            </div>
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="position-relative">
                <input [type]="showPassword ? 'text' : 'password'" class="form-control form-control-lg" [(ngModel)]="password">
                <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y me-2" (click)="showPassword = !showPassword">
                  <i [class]="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
                </button>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="position-relative">
                <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control form-control-lg" [(ngModel)]="confirmPassword">
                <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y me-2" (click)="showConfirmPassword = !showConfirmPassword">
                  <i [class]="showConfirmPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
                </button>
              </div>
            </div>
            
            <button class="btn btn-success btn-lg w-100 rounded-3 mb-3" (click)="register()" [disabled]="loading">
              {{ loading ? 'Registering...' : 'Register' }}
            </button>
            
            <div class="text-center">
              <a href="/login" class="text-decoration-none">Already have an account? Login</a>
            </div>
             <div class="text-center">
              <a href="/welcome" class="text-decoration-none">Cancel</a>
             </div>
          </div>
        </div>
      </div>
    </div>
