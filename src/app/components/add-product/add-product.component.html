<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-white border-0 pt-4 px-4">
        <h4 class="mb-0">
          <i class="fa" [ngClass]="isEditMode ? 'fa-edit' : 'fa-plus-circle'" style="margin-right: 8px; color: #007bff;"></i>
          <span class="text-primary">{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</span>
        </h4>
      </div>
      <div class="card-body p-4">
        <!-- Success Message -->
        <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
          <i class="fa fa-check-circle me-2"></i>{{ successMessage }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" (click)="successMessage = ''"></button>
        </div>
        
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show">
          <i class="fa fa-exclamation-triangle me-2"></i>{{ errorMessage }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" (click)="errorMessage = ''"></button>
        </div>

        <form (ngSubmit)="onSubmit()" #productForm="ngForm">
          <!-- Product Name -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control form-control-lg" 
              [(ngModel)]="product.name" 
              name="name"
              #name="ngModel"
              required
              minlength="3"
              placeholder="Enter product name">
            <div *ngIf="name.invalid && name.touched" class="text-danger small mt-1">
              <div *ngIf="name.errors?.['required']">Product name is required</div>
              <div *ngIf="name.errors?.['minlength']">Product name must be at least 3 characters</div>
            </div>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea 
              class="form-control" 
              rows="4" 
              [(ngModel)]="product.description" 
              name="description"
              placeholder="Enter product description"></textarea>
          </div>

          <!-- Price and Quantity -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Price <span class="text-danger">*</span></label>
              <input 
                type="number" 
                class="form-control form-control-lg" 
                [(ngModel)]="product.price" 
                name="price"
                #price="ngModel"
                required
                min="0.01"
                step="0.01"
                placeholder="0.00">
              <div *ngIf="price.invalid && price.touched" class="text-danger small mt-1">
                <div *ngIf="price.errors?.['required']">Price is required</div>
                <div *ngIf="price.errors?.['min']">Price must be greater than 0</div>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
              <input 
                type="number" 
                class="form-control form-control-lg" 
                [(ngModel)]="product.quantity" 
                name="quantity"
                #quantity="ngModel"
                required
                min="0"
                placeholder="0">
              <div *ngIf="quantity.invalid && quantity.touched" class="text-danger small mt-1">
                <div *ngIf="quantity.errors?.['required']">Quantity is required</div>
                <div *ngIf="quantity.errors?.['min']">Quantity cannot be negative</div>
              </div>
            </div>
          </div>

          <!-- Category Selection -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
            <select 
              class="form-select form-select-lg" 
              [(ngModel)]="product.categoryId" 
              name="categoryId"
              #categoryId="ngModel"
              required>
              <option value="" disabled>Select a category</option>
              <option *ngFor="let category of categories" [value]="category.id">
                {{ category.name }} ({{ category.productCount }} products)
              </option>
            </select>
            <div *ngIf="categoryId.invalid && categoryId.touched" class="text-danger small mt-1">
              Please select a category
            </div>
          </div>

          <!-- Form Actions -->
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill" [disabled]="loading || productForm.invalid">
              <i class="fa fa-save me-2"></i>{{ loading ? 'Saving...' : (isEditMode ? 'Update Product' : 'Save Product') }}
            </button>
            <a href="/products" class="btn btn-secondary btn-lg px-5 rounded-pill">
              <i class="fa fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
