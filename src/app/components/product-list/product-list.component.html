 <div class="card border-0 shadow-sm rounded-4">
      <div class="card-header bg-white border-0 pt-4 px-4">
        <div class="d-flex justify-content-between align-items-center">
          <h4 class="mb-0"><i class="fa fa-boxes me-2 text-primary"></i>Products List</h4>
          <div>
            <!-- Add Product button - Only show for Admin -->
            <button *ngIf="isAdmin" class="btn btn-success rounded-pill me-2" (click)="goToAddProduct()">
              <i class="fa fa-plus-circle me-2"></i>Add Product
            </button>
            <button class="btn btn-primary rounded-pill" (click)="loadProducts()">
              <i class="fa fa-refresh me-2"></i>Refresh
            </button>
          </div>
        </div>
      </div>
      <div class="card-body p-4">
        <div *ngIf="loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
        
        <div *ngIf="!loading && products.length > 0" class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Category</th>
                <th *ngIf="isAdmin">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let product of products">
                <td>{{ product.id }}</td>
                <td><strong>{{ product.name }}</strong></td>
                <td>{{ product.description }}</td>
                <td>{{ product.price | currency }}</td>
                <td>{{ product.quantity }}</td>
                <td>{{ product.categoryName }}</td>
                <td *ngIf="isAdmin">
                  <button class="btn btn-sm btn-warning me-1" (click)="editProduct(product.id)">
                    <i class="fa fa-edit"></i>
                  </button>
                  <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)">
                    <i class="fa fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
