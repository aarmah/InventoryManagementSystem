 <div class="row">
      <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-header bg-white border-0 pt-4 px-4">
            <h4 class="mb-0"><i class="fa fa-user-shield me-2 text-warning"></i>Admin Panel</h4>
          </div>
          <div class="card-body p-4">
            <div class="alert alert-info">
              <i class="fa fa-info-circle me-2"></i>Welcome to Admin Panel - {{ firstName }}
            </div>
            
            <div class="row text-center">
              <div class="col-md-4">
                <h3 class="text-primary">{{ totalProducts }}</h3>
                <p>Total Products</p>
              </div>
              <div class="col-md-4">
                <h3 class="text-success">{{ totalCategories }}</h3>
                <p>Total Categories</p>
              </div>
              <div class="col-md-4">
                <h3 class="text-info">{{ totalValue | currency }}</h3>
                <p>Inventory Value</p>
              </div>
            </div>
            
            <div class="mt-4">
              <a href="/products" class="btn btn-primary me-2">Manage Products</a>
              <a href="/categories" class="btn btn-success">Manage Categories</a>
            </div>
          </div>
        </div>
      </div>
    </div>
